            <h2>Đồng hồ nam</h2>

        <div class="product">

            <p>Giá: 1.200.000đ</p>

            <p>Giá: 2.000.000đ</p>
            <button onclick="muaHang()">Mua ngay</button>
        </div>

    <footer>
        <p>© 2026 Shop Đồng Hồ</p>
    </footer>

    <script src="script.js"></script>

</html>
